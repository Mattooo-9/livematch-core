name: livematch-core

services:
  - name: bot
    type: worker
    instance_type: nano
    regions:
      - fra
    docker:
      image: ghcr.io/mattooo-9/livematch-core:latest
      command: ["python", "scripts/run_bot.py"]
      credentials_secret: ghcr-creds
    scaling:
      min: 1
      max: 1
    health_checks:
      - type: tcp
        port: 8000
        interval: 30
        timeout: 5
    env:
      - key: BOT_TOKEN
        secret: bot-token
      - key: DATABASE_URL
        secret: database-url
      - key: REDIS_URL
        secret: redis-url
      - key: ADMIN_TG_IDS
        value: "8017348770"
      - key: OPENROUTER_API_KEY
        secret: openrouter-key
      - key: SECRET_KEY
        secret: secret-key
      - key: ADMIN_API_TOKEN
        secret: admin-token
      - key: BOT_USE_WEBHOOK
        value: "false"
      - key: RUN_SCHEDULER_IN_API
        value: "true"
      - key: WATCHDOG_MAX_MEM_MB
        value: "380"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: NODE_ROLE
        value: "primary"

  - name: api
    type: web
    instance_type: nano
    regions:
      - fra
    docker:
      image: ghcr.io/mattooo-9/livematch-core:latest
      command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
      credentials_secret: ghcr-creds
    ports:
      - port: 8000
        protocol: http
        path: /
    health_checks:
      - type: http
        path: /health
        port: 8000
        interval: 30
    scaling:
      min: 1
      max: 2
    env:
      - key: BOT_TOKEN
        secret: bot-token
      - key: DATABASE_URL
        secret: database-url
      - key: REDIS_URL
        secret: redis-url
      - key: SECRET_KEY
        secret: secret-key
      - key: ADMIN_API_TOKEN
        secret: admin-token
      - key: OPENROUTER_API_KEY
        secret: openrouter-key
      - key: ADMIN_TG_IDS
        value: "8017348770"
      - key: BOT_USE_WEBHOOK
        value: "false"
      - key: RUN_SCHEDULER_IN_API
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"
