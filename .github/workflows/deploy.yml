name: Deploy via Skyvern + Render

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - name: Install deps
        run: pip install -q requests

      - name: Deploy via Skyvern browser automation + Render API
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          RENDER_TOKEN:        ${{ secrets.RENDER_TOKEN }}
          BOT_TOKEN:           ${{ secrets.BOT_TOKEN }}
          ADMIN_TG_IDS:        ${{ secrets.ADMIN_TG_IDS }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          SECRET_KEY:          ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN:     ${{ secrets.ADMIN_API_TOKEN }}
          SKYVERN_API_KEY:     ${{ secrets.SKYVERN_API_KEY }}
        run: python .github/scripts/deploy_full.py
