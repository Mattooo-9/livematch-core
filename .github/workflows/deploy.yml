name: Deploy Production Cluster

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install -q -r requirements-dev.txt
      - run: DATABASE_URL="sqlite+aiosqlite:///:memory:" BOT_TOKEN="123:test" python -m pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mattooo-9/livematch-core
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-koyeb:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install -q requests
      - name: Deploy to Koyeb (PRIMARY)
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          KOYEB_TOKEN:        ${{ secrets.KOYEB_TOKEN }}
          BOT_TOKEN:          ${{ secrets.BOT_TOKEN }}
          ADMIN_TG_IDS:       "8017348770"
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          REDIS_URL:          ${{ secrets.REDIS_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SECRET_KEY:         ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN:    ${{ secrets.ADMIN_API_TOKEN }}
        run: python .github/scripts/deploy_koyeb.py

  deploy-vercel:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: "20"}
      - name: Deploy to Vercel (SECONDARY/PASSIVE)
        env:
          VERCEL_TOKEN:       ${{ secrets.VERCEL_TOKEN }}
          BOT_TOKEN:          ${{ secrets.BOT_TOKEN }}
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          REDIS_URL:          ${{ secrets.REDIS_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SECRET_KEY:         ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN:    ${{ secrets.ADMIN_API_TOKEN }}
          BOT_WEBHOOK_SECRET: ${{ secrets.BOT_WEBHOOK_SECRET }}
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN || true
          vercel build --prod --token=$VERCEL_TOKEN
          VERCEL_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN \
            -e BOT_TOKEN="$BOT_TOKEN" \
            -e DATABASE_URL="$DATABASE_URL" \
            -e REDIS_URL="$REDIS_URL" \
            -e SECRET_KEY="$SECRET_KEY" \
            -e ADMIN_API_TOKEN="$ADMIN_API_TOKEN" \
            -e BOT_WEBHOOK_SECRET="$BOT_WEBHOOK_SECRET" \
            -e OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
            -e NODE_ROLE="secondary" \
            2>&1 | grep "https://" | tail -1)
          echo "Vercel URL: $VERCEL_URL"
          echo "VERCEL_URL=$VERCEL_URL" >> $GITHUB_ENV

  verify:
    needs: [deploy-koyeb, deploy-vercel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install -q requests
      - name: Verify cluster health
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KOYEB_TOKEN:  ${{ secrets.KOYEB_TOKEN }}
        run: python .github/scripts/verify_cluster.py

  # Отдельный workflow для первоначальной регистрации (запускается один раз)
